; =========================================================================
; PlatformIO project configuration — Super 8 Camera Firmware
;
; Usage:
;   pio run                   Build
;   pio run -t upload         Flash via ST-Link
;   pio run -t clean          Clean
;   pio device monitor        Serial monitor (if USART debug added)
; =========================================================================

[env:super8_stm32l0]
platform     = ststm32
board        = nucleo_l031k6
framework    = cmsis

; Source files
src_filter   = +<main.c> +<motor_control.c> +<metering.c>

; Compiler flags
build_flags  =
    -std=c11
    -Wall -Wextra -Wpedantic
    -Os
    -DSTM32L031xx
    -ffunction-sections
    -fdata-sections
    -lm

; Upload via ST-Link
upload_protocol = stlink

; Debug
debug_tool      = stlink
debug_init_break = tbreak main

; Monitor (if USART debug is wired up)
monitor_speed   = 115200
