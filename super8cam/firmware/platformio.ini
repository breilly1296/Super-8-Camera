; Super 8 Camera Firmware — PlatformIO build configuration
;
; Two targets:
;   super8_stm32l0  — Production STM32L031K6 (bare-register CMSIS)
;   super8_nano     — Prototype Arduino Nano (for bench testing)

[env:super8_stm32l0]
platform        = ststm32
board           = nucleo_l031k6
framework       = cmsis
src_dir         = src
build_flags     = -std=c11 -Wall -Wextra -Os -DSTM32L031xx -lm
upload_protocol = stlink
debug_tool      = stlink

[env:super8_nano]
platform    = atmelavr
board       = nanoatmega328
framework   = arduino
src_dir     = src
build_flags = -std=c11 -Wall -Wextra -Os -DARDUINO_TARGET
upload_port = /dev/ttyUSB0
monitor_speed = 115200
