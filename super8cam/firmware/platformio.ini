; platformio.ini — Super 8 Camera Firmware Build Configuration
;
; Two targets:
;   [env:super8_stm32l0]   Production: STM32L031K6 via ST-Link
;   [env:super8_nano]      Prototype:  Arduino Nano (ATmega328P)

[platformio]
default_envs = super8_stm32l0

; =====================================================================
; PRODUCTION TARGET — STM32L031K6 (Nucleo-L031K6 board or custom PCB)
;
; CMSIS framework: bare-register access, no HAL overhead.
; Flash via ST-Link V2 (built into Nucleo, or standalone probe).
; =====================================================================

[env:super8_stm32l0]
platform        = ststm32
board           = nucleo_l031k6
framework       = cmsis
src_dir         = src
build_flags     =
    -std=c11
    -Wall
    -Wextra
    -Wpedantic
    -Os
    -DSTM32L031xx
    -lm
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200

; =====================================================================
; PROTOTYPE TARGET — Arduino Nano (ATmega328P)
;
; For bench testing the state machine and PID logic before the custom
; PCB is ready.  Timer/GPIO mappings differ — use #ifdef __AVR__ guards
; in code for platform-specific register access.
;
; Note: metering and galvanometer functions may need Arduino analogRead
; shims.  Motor PWM uses Timer1 (pins 9/10) on AVR.
; =====================================================================

[env:super8_nano]
platform        = atmelavr
board           = nanoatmega328
framework       = arduino
src_dir         = src
build_flags     =
    -Wall
    -Os
    -DARDUINO_PROTOTYPE
    -lm
monitor_speed   = 115200
